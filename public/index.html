<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Urbani Scheduling</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h1>Urbani</h1>
      <p>Scheduling</p>
      <nav>
        <a href="/catalogo">Catálogo</a>
        <a href="/calendario">Calendario</a>
      </nav>
    </aside>

    <main class="grid">
    <section id="catalogo" class="card">
      <h2>Catálogo</h2>
      <button id="loadProjects">Cargar proyectos</button>
      <ul id="projectsList"></ul>
    </section>

    <section id="calendario" class="card card-wide">
      <h2>Calendario</h2>
      <div class="filters">
        <select id="projectFilter"></select>
        <input id="fromFilter" type="date" />
        <input id="toFilter" type="date" />
        <button id="loadCalendar">Ver calendario</button>
      </div>
      <div class="legend">
        <span class="chip available">Disponible</span>
        <span class="chip booked">Reservado</span>
        <span class="chip blocked">Bloqueado</span>
      </div>
      <div id="calendarGrid" class="calendar-grid"></div>
    </section>

    </main>
  </div>

  <script src="/app.js"></script>
</body>
</html>
